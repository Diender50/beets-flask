# ------------------------------------------------------------------------------------ #
#                                 DO NOT EDIT THIS FILE                                #
# ------------------------------------------------------------------------------------ #
# these are the defaults for the gui.
# you must provide your own config and map it to /config/beets-flask/config.yaml
# to get started, see the auto-generated examples in /config/beets-flask/

gui:
    num_preview_workers: 4

    library:
        readonly: no
        artist_separators: [",", ";", "&"]

    terminal:
        start_path: "/repo"

    inbox:
        ignore: "_use_beets_ignore"
        debounce_before_autotag: 30
        concat_nested_folders: yes
        expand_files: no

    discovery:
        musicbrainz:
            # MusicBrainz API base URL (set this for self-hosted instances).
            # Example: "https://musicbrainz.yourdomain.tld/ws/2"
            base_url: "https://musicbrainz.org/ws/2"

        deemix:
            # User-managed docker/service endpoint. Example: "http://deemix:6595"
            base_url: "http://deemix:6595"
            # Optional auth header if your deemix bridge requires it. Example: "Bearer <token>"
            auth_header: ""
            # Optional Deezer ARL for authentication. Obtain from deemix bridge API.
            arl: ""
            # Inbox key/name/path where downloads should be written (e.g. Inbox3)
            inbox_folder: ""
            timeout_seconds: 20

        slskd:
            # User-managed docker/service endpoint. Example: "http://slskd:5030"
            base_url: "http://slskd:5030"
            # Optional slskd API key
            api_key: ""
            # Inbox key/name/path where downloads should be written (e.g. Inbox3)
            inbox_folder: ""
            timeout_seconds: 40
            scoring:
                # Upload speed below which a result is penalised (bytes/s). Default 1 MB/s.
                speed_min_bps: 1000000
                # Queue length above which a result is penalised. Default 100.
                queue_max: 100

        squidwtf:
            # Public SquidWTF qobuz API endpoint.
            base_url: "https://qobuz.squid.wtf"
            # Inbox key/name/path where downloads should be written (e.g. Inbox3)
            inbox_folder: ""
            timeout_seconds: 45

        auto_download:
            # Minimum match score (0.0–1.0) for batch/auto downloads.
            # Results with a score strictly below this threshold are skipped;
            # if no provider reaches the threshold the album is not downloaded.
            # 0.0 disables the filter (default).
            min_score: 0.0

            # Quality priority list for batch/auto downloads (highest priority first).
            # Each entry is "container" or "container:spec":
            #   flac:24  — lossless 24-bit hi-res (squidwtf only)
            #   flac:16  — lossless 16-bit CD quality
            #   mp3:NNN  — MP3 at NNN kbps (e.g. mp3:320, mp3:128)
            #   opus:NNN, m4a:NNN — lossy at NNN kbps (slskd only)
            # Bare "flac" expands to flac:24 then flac:16.
            # Bare "mp3" expands to mp3:320, mp3:256, mp3:192, mp3:128.
            quality_priority:
                - flac:24
                - flac:16
                - mp3:320
                - opus:320
                - opus:256
                - m4a:320
                - m4a:256
                - opus:192
                - m4a:192
                - mp3:256
                - opus:128
                - m4a:128
                - mp3:192
                - mp3:128
                - opus:96
                - m4a:96
                - mp3:96
                - opus:64
                - m4a:64
                - mp3:64


