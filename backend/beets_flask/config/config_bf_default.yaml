# ------------------------------------------------------------------------------------ #
#                                 DO NOT EDIT THIS FILE                                #
# ------------------------------------------------------------------------------------ #
# these are the defaults for the gui.
# you must provide your own config and map it to /config/beets-flask/config.yaml
# to get started, see the auto-generated examples in /config/beets-flask/

gui:
    num_preview_workers: 4

    library:
        readonly: no
        artist_separators: [",", ";", "&"]

    terminal:
        start_path: "/repo"

    inbox:
        ignore: "_use_beets_ignore"
        debounce_before_autotag: 30
        concat_nested_folders: yes
        expand_files: no

    discovery:
        deemix:
            # User-managed docker/service endpoint. Example: "http://deemix:6595"
            base_url: "http://deemix:6595"
            # Optional auth header if your deemix bridge requires it. Example: "Bearer <token>"
            auth_header: ""
            timeout_seconds: 20

        slskd:
            # User-managed docker/service endpoint. Example: "http://slskd:5030"
            base_url: "http://slskd:5030"
            # Optional slskd API key
            api_key: ""
            timeout_seconds: 40

        ranking:
            # balanced | quality | speed
            mode: "balanced"
            min_bitrate_kbps: 192
